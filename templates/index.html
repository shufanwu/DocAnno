<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档解析标注工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/handsontable.full.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=20260612-1">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand-icon">📄</span>
            <span>文档解析标注工具</span>
        </div>
        <div class="nav-current-dir">
            当前目录: 
            <span id="currentDir" class="dir-path">未选择</span>
            <button id="changeDirBtn" class="btn btn-small btn-secondary">更换目录</button>
        </div>
        <div class="nav-actions">
            <button id="settingsBtn" class="btn btn-small" title="设置">⚙️ 设置</button>
            <button id="shortcutsBtn" class="btn btn-small" title="快捷键">⌨️ 快捷键</button>
        </div>
    </nav>

    <div class="main-container">
        <div class="left-panel" id="leftPanel">
            <div class="image-nav image-nav-top">
                <span id="imageValidityIndicator" class="image-validity-indicator neutral" title="尚未加载图片"></span>
                <button id="invalidImagesOnlyBtn" class="nav-filter-btn" title="仅显示含无效框的图片">仅无效图片</button>
                <button id="firstImageBtn" class="nav-btn" disabled>⏮️</button>
                <button id="prevImageBtn" class="nav-btn" disabled>⬅️</button>
                <span id="imageCounter" class="counter">0 / 0</span>
                <button id="nextImageBtn" class="nav-btn" disabled>➡️</button>
                <button id="lastImageBtn" class="nav-btn" disabled>⏭️</button>
            </div>
            <div class="toolbar">
                <div class="toolbar-group">
                    <button id="selectMoveBtn" class="tool-btn active" title="选择/移动">
                        <span class="tool-icon">👆</span>
                        <span class="tool-label">选择/移动</span>
                    </button>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group">
                    <button id="rectBoxBtn" class="tool-btn" title="矩形框">
                        <span class="tool-icon">⬜</span>
                        <span class="tool-label">矩形框</span>
                    </button>
                    <button id="polygonBtn" class="tool-btn" title="多边形框">
                        <span class="tool-icon">🔷</span>
                        <span class="tool-label">多边形框</span>
                    </button>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group">
                    <button id="toggleLabelsBtn" class="tool-btn" title="显示标签">
                        <span class="tool-icon">🏷</span>
                        <span class="tool-label">显示标签</span>
                    </button>
                    <button id="invalidOnlyBtn" class="tool-btn" title="仅显示无效框">
                        <span class="tool-icon">⚠</span>
                        <span class="tool-label">仅无效框</span>
                    </button>
                    <button id="deleteBoxBtn" class="tool-btn" title="删除框">
                        <span class="tool-icon">🗑️</span>
                        <span class="tool-label">删除框</span>
                    </button>
                    <button id="undoBtn" class="tool-btn" title="撤销" disabled>
                        <span class="tool-icon">↩️</span>
                        <span class="tool-label">撤销</span>
                    </button>
                    <button id="redoBtn" class="tool-btn" title="重做" disabled>
                        <span class="tool-icon">↪️</span>
                        <span class="tool-label">重做</span>
                    </button>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group">
                    <div class="zoom-controls">
                        <button id="zoomOutBtn" class="btn btn-small">-</button>
                        <span id="zoomLevel">100%</span>
                        <button id="zoomInBtn" class="btn btn-small">+</button>
                    </div>
                    <button id="fitWindowBtn" class="tool-btn" title="适应窗口">
                        <span class="tool-icon">⛶</span>
                        <span class="tool-label">适应窗口</span>
                    </button>
                </div>
            </div>
            
            <div class="image-container-wrapper">
                <div class="image-container" id="imageContainer">
                    <img id="documentImage" src="" alt="文档图片">
                    <div id="noImagePlaceholder" class="placeholder">
                        <p>请先选择包含文档图片的目录</p>
                    </div>
                    <svg id="boxesOverlay" class="boxes-overlay"></svg>
                </div>
            </div>
            
        </div>
        
        <div class="resizer" id="resizer"></div>
        
        <div class="right-panel" id="rightPanel">
            <div class="panel-header">
                <h3>框详细信息</h3>
                <div class="panel-nav">
                    <span id="boxCounter">0 / 0</span>
                    <button id="prevBoxBtn" class="nav-btn-small" disabled>⬅️</button>
                    <button id="nextBoxBtn" class="nav-btn-small" disabled>➡️</button>
                    <button id="closePanelBtn" class="nav-btn-small" title="关闭面板">✕</button>
                </div>
            </div>
            
            <div id="panelContent" class="panel-content">
                <div id="noBoxSelected" class="no-selection">
                    <p>请选择一个框以查看详细信息</p>
                </div>
                
                <div id="boxDetails" class="box-details" style="display: none;">
                    <div class="detail-section" id="boxPreviewSection">
                        <label class="section-label">预览（框内容）</label>
                        <div class="preview-container" id="previewContainer">
                            <canvas id="boxPreview"></canvas>
                        </div>
                    </div>
                    
                    <div class="detail-section">
                        <label class="section-label" for="blockIdInput">框序号（block_id）</label>
                        <input id="blockIdInput" class="detail-input" type="number" min="0" step="1" placeholder="未设置">
                    </div>

                    <div class="detail-section">
                        <label class="section-label">类别</label>
                        <select id="categorySelect" class="category-select">
                            <option value="chart">chart</option>
                            <option value="vertical_text">vertical_text</option>
                            <option value="number">number</option>
                            <option value="vision_footnote">vision_footnote</option>
                            <option value="footer">footer</option>
                            <option value="algorithm">algorithm</option>
                            <option value="header">header</option>
                            <option value="content">content</option>
                            <option value="display_formula">display_formula</option>
                            <option value="table">table</option>
                            <option value="doc_title">doc_title</option>
                            <option value="image">image</option>
                            <option value="formula_number">formula_number</option>
                            <option value="figure_title">figure_title</option>
                            <option value="aside_text">aside_text</option>
                            <option value="text">text</option>
                            <option value="footer_image">footer_image</option>
                            <option value="abstract">abstract</option>
                            <option value="seal">seal</option>
                            <option value="header_image">header_image</option>
                            <option value="reference_content">reference_content</option>
                            <option value="footnote">footnote</option>
                            <option value="inline_formula">inline_formula</option>
                            <option value="paragraph_title">paragraph_title</option>
                        </select>
                    </div>
                    
                    <div class="detail-section" id="contentEditorSection">
                        <label class="section-label">文本内容</label>
                        <textarea id="contentTextarea" class="content-textarea" rows="8" placeholder="输入框内容..."></textarea>
                        <div class="textarea-footer">
                            <span id="charCount">0 / 2000</span>
                        </div>
                    </div>

                    <div id="tableEditorSection" class="table-editor-section" style="display: none;">
                        <div class="table-editor-header">
                            <span class="section-label">表格标注编辑</span>
                            <div class="table-editor-actions">
                                <button id="mergeTableCellsBtn" class="btn btn-small">合并单元格</button>
                                <button id="unmergeTableCellsBtn" class="btn btn-small">取消合并</button>
                            </div>
                        </div>
                        <div id="tableEditorContainer" class="table-editor-container"></div>
                        <div id="tableEditorStatus" class="table-editor-status"></div>
                    </div>
                    
                    <div class="detail-section" id="renderResultSection">
                        <label class="section-label">渲染结果</label>
                        <div class="render-container" id="renderContainer">
                            <div id="renderContent" class="render-content"></div>
                        </div>
                    </div>
                    
                    <div class="detail-actions">
                        <button id="deleteThisBoxBtn" class="btn btn-danger">删除此框</button>
                        <button id="copyContentBtn" class="btn btn-secondary">复制内容</button>
                        <button id="saveChangesBtn" class="btn btn-primary">保存修改</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="directoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>选择目录</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="path-input">
                    <input type="text" id="pathInput" placeholder="输入或选择目录路径">
                    <button id="goPathBtn" class="btn btn-small">前往</button>
                </div>
                <div class="breadcrumb" id="breadcrumb"></div>
                <div class="directory-list" id="directoryList"></div>
            </div>
            <div class="modal-footer">
                <button id="confirmDirBtn" class="btn btn-primary" disabled>确认选择</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/handsontable.full.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}?v=20260612-2"></script>
</body>
</html>
